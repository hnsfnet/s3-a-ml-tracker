version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ml-experiment-tracker:latest
    container_name: ml-tracker-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/ml_tracker.db}
      - MODEL_STORAGE_DIR=${MODEL_STORAGE_DIR:-/app/data/model_storage}
      - DATASET_STORAGE_DIR=${DATASET_STORAGE_DIR:-/app/data/dataset_storage}
      - RESULT_STORAGE_DIR=${RESULT_STORAGE_DIR:-/app/data/result_storage}
    volumes:
      - ml_tracker_data:/app/data

volumes:
  ml_tracker_data:
